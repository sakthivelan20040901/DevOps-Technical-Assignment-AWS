<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DevOps Monitoring Dashboard for Demo Video</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- ================================= -->
    <!-- HEADER -->
    <!-- ================================= -->

    <header>

        <h1>🚀 DevOps Monitoring Dashboard</h1>

        <div class="time-box">

            <span id="server-time">
                Loading...
            </span>

        </div>

    </header>


    <!-- ================================= -->
    <!-- TOP METRIC CARDS -->
    <!-- ================================= -->

    <section class="grid">

        <div class="card" id="health-card">

            <h3>❤️ Health</h3>

            <h1 id="health">--</h1>

        </div>

        <div class="card" id="cpu-card">

            <h3>💻 CPU Usage</h3>

            <h1 id="cpu">0%</h1>

            <p id="cpu-status"></p>

            <div class="progress">

                <div id="cpu-progress"></div>

            </div>

        </div>

        <div class="card" id="memory-card">

            <h3>🧠 Memory Usage</h3>

            <h1 id="memory">0%</h1>

            <p id="memory-status"></p>

            <div class="progress">

                <div id="memory-progress"></div>

            </div>

        </div>

        <div class="card" id="disk-card">

            <h3>💾 Disk Usage</h3>

            <h1 id="disk">0%</h1>

            <p id="disk-status"></p>

            <div class="progress">

                <div id="disk-progress"></div>

            </div>

        </div>

    </section>



    <!-- ================================= -->
    <!-- LIVE CHARTS -->
    <!-- ================================= -->

    <section class="chart-grid">

        <div class="chart-card">

            <h2>CPU Usage</h2>

            <canvas id="cpuChart"></canvas>

        </div>

        <div class="chart-card">

            <h2>Memory Usage</h2>

            <canvas id="memoryChart"></canvas>

        </div>

        <div class="chart-card">

            <h2>Disk Usage</h2>

            <canvas id="diskChart"></canvas>

        </div>

    </section>



    <!-- ================================= -->
    <!-- SYSTEM INFORMATION -->
    <!-- ================================= -->

    <section class="bottom-grid">

        <div class="info-card">

            <h2>🖥 System Information</h2>

            <table>

                <tr>

                    <td>Hostname</td>

                    <td id="hostname"></td>

                </tr>

                <tr>

                    <td>Operating System</td>

                    <td id="os"></td>

                </tr>

                <tr>

                    <td>Kernel</td>

                    <td id="release"></td>

                </tr>

                <tr>

                    <td>Python</td>

                    <td id="python"></td>

                </tr>

                <tr>

                    <td>Uptime</td>

                    <td id="uptime"></td>

                </tr>

                <tr>

                    <td>Public IP</td>

                    <td id="public-ip"></td>

                </tr>

            </table>

        </div>



        <!-- ================================= -->
        <!-- SERVICES -->
        <!-- ================================= -->

        <div class="info-card">

            <h2>🟢 Service Status</h2>

            <table>

                <tr>

                    <td>Flask</td>

                    <td id="flask-status"></td>

                </tr>

                <tr>

                    <td>Gunicorn</td>

                    <td id="gunicorn-status"></td>

                </tr>

                <tr>

                    <td>Nginx</td>

                    <td id="nginx-status"></td>

                </tr>

            </table>

        </div>

    </section>



    <!-- ================================= -->
    <!-- FOOTER -->
    <!-- ================================= -->

    <footer>

        <p>

            Last Updated :

            <span id="last-updated">

                --

            </span>

        </p>

    </footer>

</div>



<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
